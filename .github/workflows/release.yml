name: Build and Release

on:
  push:
    branches: [main]

# Least-privilege: no permissions by default, granted per-job below.
permissions: {}

env:
  PYTHON_VERSION: "3.12"
  ARTIFACT_NAME: "fm-browser"
  PYZ_FILENAME: "fm-browser.pyz"
  WHL_DIR: "dist"
  VERSION: "v0.0.${{ github.run_number }}"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read   # checkout only

    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements-build.txt

      - name: Install build tooling
        run: pip install --upgrade pip setuptools wheel build

      - name: Build zipapp (.pyz) with pinned dependencies
        run: python scripts/build_zipapp.py --portable -r requirements-build.txt -o "${{ env.PYZ_FILENAME }}"

      - name: Build wheel (.whl)
        run: python -m build --wheel --outdir "${{ env.WHL_DIR }}"

      - name: Generate SHA-256 checksums
        run: |
          sha256sum "${{ env.PYZ_FILENAME }}" > checksums-sha256.txt
          sha256sum "${{ env.WHL_DIR }}"/*.whl >> checksums-sha256.txt
          cat checksums-sha256.txt

      - name: Upload zipapp artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: ${{ env.ARTIFACT_NAME }}-pyz
          path: ${{ env.PYZ_FILENAME }}
          if-no-files-found: error

      - name: Upload wheel artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: ${{ env.ARTIFACT_NAME }}-whl
          path: ${{ env.WHL_DIR }}/*.whl
          if-no-files-found: error

      - name: Upload checksums
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: ${{ env.ARTIFACT_NAME }}-checksums
          path: checksums-sha256.txt
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write  # create tags and releases

    steps:
      - name: Download zipapp artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          name: ${{ env.ARTIFACT_NAME }}-pyz

      - name: Download wheel artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          name: ${{ env.ARTIFACT_NAME }}-whl

      - name: Download checksums
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          name: ${{ env.ARTIFACT_NAME }}-checksums

      - name: Create GitHub Release
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631  # v2.2.2
        with:
          tag_name: ${{ env.VERSION }}
          name: "Release ${{ env.VERSION }}"
          generate_release_notes: true
          files: |
            ${{ env.PYZ_FILENAME }}
            *.whl
            checksums-sha256.txt
